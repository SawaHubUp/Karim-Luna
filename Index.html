function calcStats(sections) {
  let confirmed=0,declined=0,uncertain=0;
  sections.forEach(s=>s.subgroups.forEach(sg=>sg.entries.forEach(e=>{
    if(e.type==='i'){
      if(e.status==='confirmed')confirmed++;
      else if(e.status==='declined')declined++;
      else uncertain++;
    } else {
      const m=e.max||1;
      if(e.count===null)uncertain+=m;
      else if(e.count===0)declined+=m;
      else{confirmed+=e.count;uncertain+=(m-e.count);}
    }
  })));
  return{confirmed,declined,uncertain,total:confirmed+declined+uncertain};
}

function StatusBtn({active,color,activeBg,onClick,label}){
  const [hover,setHover]=useState(false);
  return(
    <button
      onClick={onClick}
      onMouseEnter={()=>setHover(true)}
      onMouseLeave={()=>setHover(false)}
      style={{
        width:36,height:36,borderRadius:9,
        border:active?`2px solid ${color}`:(hover?`1.5px solid ${color}`:'1.5px solid #e8d8c8'),
        background:active?activeBg:(hover?activeBg+'88':'#faf6f2'),
        color:active?color:(hover?color:'#c8b0a0'),
        fontSize:18,fontWeight:900,cursor:'pointer',
        display:'flex',alignItems:'center',justifyContent:'center',
        transition:'all 0.15s',
        transform:active?'scale(1.12)':'scale(1)',
        flexShrink:0,padding:0,fontFamily:"'Cairo',sans-serif",
      }}>{label}</button>
  );
}

function EntryRow({entry,isEditing,onEdit,onStopEdit,onUpdate}){
  const [editVal,setEditVal]=useState(entry.name);
  const inputRef=useRef(null);

  useEffect(()=>{
    if(isEditing&&inputRef.current){
      inputRef.current.focus();
      inputRef.current.select();
      setEditVal(entry.name);
    }
  },[isEditing]);

  const commitEdit=()=>{
    const v=editVal.trim();
    if(v)onUpdate({name:v});
    onStopEdit();
  };

  const rowBg=
    entry.type==='i'&&entry.status==='confirmed'?'#f0faf5':
    entry.type==='i'&&entry.status==='declined'?'#fff6f6':
    entry.type==='g'&&entry.count>0?'#f3faf6':'#ffffff';

  const dotColor=
    entry.type==='i'&&entry.status==='confirmed'?'#2d7a4f':
    entry.type==='i'&&entry.status==='declined'?'#c03838':
    entry.type==='i'&&entry.status==='uncertain'?'#d4a017':
    entry.type==='g'&&entry.count>0?'#2d7a4f':
    entry.type==='g'&&entry.count===0?'#c03838':'#ddd';

  return(
    <div style={{
      display:'flex',alignItems:'center',
      padding:'10px 16px',
      borderBottom:'1px solid #f5ece2',
      background:rowBg,
      gap:10,
      transition:'background 0.25s',
    }}>
      <div style={{
        width:8,height:8,borderRadius:'50%',flexShrink:0,
        background:dotColor,transition:'background 0.25s',
      }}/>

      <div style={{flex:1,minWidth:0}}>
        {isEditing?(
          <input
            ref={inputRef}
            value={editVal}
            onChange={e=>setEditVal(e.target.value)}
            onBlur={commitEdit}
            onKeyDown={e=>{
              if(e.key==='Enter')commitEdit();
              if(e.key==='Escape'){setEditVal(entry.name);onStopEdit();}
            }}
            style={{
              width:'100%',border:'1.5px solid #c49a6c',borderRadius:7,
              padding:'4px 10px',fontFamily:"'Cairo',sans-serif",
              fontSize:14,color:'#4a2e22',outline:'none',
              background:'#fdf6ef',direction:'rtl',boxSizing:'border-box',
            }}
          />
        ):(
          <span
            onClick={onEdit}
            title="اضغطي لتعديل الاسم"
            style={{
              fontSize:14,color:'#4a2e22',cursor:'text',
              display:'block',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
              borderBottom:'1px dashed transparent',
              transition:'border-color 0.2s',
            }}
            onMouseEnter={e=>e.currentTarget.style.borderBottomColor='#c49a6c'}
            onMouseLeave={e=>e.currentTarget.style.borderBottomColor='transparent'}
          >
            {entry.name}
            {entry.type==='g'&&(
              <span style={{fontSize:11,color:'#a07850',marginRight:6}}>
                (الأصل: {entry.max})
              </span>
            )}
          </span>
        )}
      </div>

      {entry.type==='i'?(
        <div style={{display:'flex',gap:5,flexShrink:0}}>
          <StatusBtn active={entry.status==='confirmed'} color="#2d7a4f" activeBg="#e6f6ee"
            onClick={()=>onUpdate({status:entry.status==='confirmed'?null:'confirmed'})} label="✓"/>
          <StatusBtn active={entry.status==='declined'}  color="#c03838" activeBg="#fdecea"
            onClick={()=>onUpdate({status:entry.status==='declined'?null:'declined'})}  label="✗"/>
          <StatusBtn active={entry.status==='uncertain'} color="#c49a1c" activeBg="#fdf6dd"
            onClick={()=>onUpdate({status:entry.status==='uncertain'?null:'uncertain'})} label="؟"/>
        </div>
      ):(
        <div style={{display:'flex',alignItems:'center',gap:7,flexShrink:0}}>
          <span style={{fontSize:12,color:'#9a7060'}}>حاضرات</span>
          <input
            type="number" min={0} max={entry.max}
            value={entry.count===null?'':entry.count}
            placeholder="—"
            onChange={e=>{
              const raw=e.target.value;
              if(raw===''){onUpdate({count:null});return;}
              const v=Math.min(entry.max,Math.max(0,parseInt(raw)||0));
              onUpdate({count:v});
            }}
            style={{
              width:54,textAlign:'center',
              border:'1.5px solid #c49a6c',borderRadius:9,
              padding:'6px 4px',fontFamily:"'Cairo',sans-serif",
              fontSize:16,color:'#2d7a4f',fontWeight:700,
              background:'#f5faf8',direction:'ltr',outline:'none',
            }}
          />
        </div>
      )}
    </div>
  );
}

function SectionCard({section,updateEntry}){
  const [open,setOpen]=useState(true);
  const [editingId,setEditingId]=useState(null);
  const stats=calcStats([section]);
  return(
    <div style={{
      background:'#fff',borderRadius:16,marginBottom:14,
      overflow:'hidden',
      boxShadow:'0 2px 18px rgba(139,94,82,0.11)',
      border:'1px solid #f0e0d0',
    }}>
      <div
        onClick={()=>setOpen(p=>!p)}
        style={{
          background:'linear-gradient(100deg,#f8ede3 0%,#fdf6ef 100%)',
          padding:'13px 16px',cursor:'pointer',
          display:'flex',justifyContent:'space-between',alignItems:'center',
          borderBottom:open?'1px solid #f0e0d0':'none',
          userSelect:'none',
        }}
      >
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:15,fontWeight:700,color:'#6a3a28'}}>{section.title}</span>
          <span style={{
            fontSize:11,color:'#b07a5a',background:'#f5e2d0',
            padding:'2px 10px',borderRadius:20,fontWeight:600,
          }}>{stats.total} معزومة</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {stats.confirmed>0&&<span style={{fontSize:12,color:'#2d7a4f',fontWeight:700}}>✓{stats.confirmed}</span>}
          {stats.declined>0 &&<span style={{fontSize:12,color:'#c03838',fontWeight:700}}>✗{stats.declined}</span>}
          {stats.uncertain>0&&<span style={{fontSize:12,color:'#b89020',fontWeight:700}}>؟{stats.uncertain}</span>}
          <span style={{color:'#c49a6c',fontSize:14}}>{open?'▲':'▼'}</span>
        </div>
      </div>

      {open&&section.subgroups.map(sg=>(
        <div key={sg.id}>
          {sg.title&&(
            <div style={{
              padding:'7px 16px 5px',
              background:'#faf3ee',
              borderBottom:'1px solid #f5e8de',
            }}>
              <span style={{fontSize:12,color:'#9a6848',fontWeight:600}}>— {sg.title}</span>
            </div>
          )}
          {sg.entries.map(entry=>(
            <EntryRow
              key={entry.id}
              entry={entry}
              isEditing={editingId===entry.id}
              onEdit={()=>setEditingId(entry.id)}
              onStopEdit={()=>setEditingId(null)}
              onUpdate={(patch)=>updateEntry(section.id,sg.id,entry.id,patch)}
            />
          ))}
        </div>
      ))}
    </div>
  );
}

function App(){
  const [data,setData]=useState(()=>{
    try{
      const saved=localStorage.getItem(STORAGE_KEY);
      return saved?JSON.parse(saved):INITIAL_DATA;
    }catch{return INITIAL_DATA;}
  });
  const [flash,setFlash]=useState(false);
  const saveRef=useRef(null);

  const scheduleSave=useCallback((newData)=>{
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(()=>{
      try{
        localStorage.setItem(STORAGE_KEY,JSON.stringify(newData));
        setFlash(true);
        setTimeout(()=>setFlash(false),1200);
      }catch{}
    },600);
  },[]);

  const updateEntry=useCallback((sId,sgId,eId,patch)=>{
    setData(prev=>{
      const next=prev.map(s=>s.id!==sId?s:{
        ...s,subgroups:s.subgroups.map(sg=>sg.id!==sgId?sg:{
          ...sg,entries:sg.entries.map(e=>e.id!==eId?e:{...e,...patch})
        })
      });
      scheduleSave(next);
      return next;
    });
  },[scheduleSave]);

  const stats=calcStats(data);

  return(
    <div style={{fontFamily:"'Cairo',sans-serif",background:'#fdf6ef',minHeight:'100vh',paddingBottom:70}}>

      {/* Sticky header */}
      <div style={{
        position:'sticky',top:0,zIndex:100,
        background:'linear-gradient(135deg,#7a4030 0%,#c49a6c 100%)',
        boxShadow:'0 4px 24px rgba(120,60,40,0.30)',
        padding:'16px 16px 14px',
      }}>
        <div style={{maxWidth:660,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <h1 style={{color:'#fff',fontSize:18,fontWeight:900,letterSpacing:0.5}}>
              💐 قائمة معازيم العرس
            </h1>
            <span style={{
              fontSize:11,
              color:flash?'#a8f0c8':'rgba(255,255,255,0.55)',
              transition:'color 0.4s',
              fontWeight:flash?700:400,
            }}>
              {flash?'✓ تم الحفظ':'محفوظ تلقائياً'}
            </span>
          </div>

          {/* Stats */}
          <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap',justifyContent:'center'}}>
            {[
              {count:stats.confirmed,label:'مؤكدات', emoji:'✓',color:'#6eeaa0',bg:'rgba(46,160,90,0.22)'},
              {count:stats.declined, label:'اعتذرن', emoji:'✗',color:'#ff9898',bg:'rgba(200,50,50,0.22)'},
              {count:stats.uncertain,label:'غير مؤكد',emoji:'؟',color:'#ffe580',bg:'rgba(200,160,0,0.22)'},
              {count:stats.total,    label:'الإجمالي',emoji:'👥',color:'#fff',  bg:'rgba(255,255,255,0.15)'},
            ].map(s=>(
              <div key={s.label} style={{
                background:s.bg,borderRadius:22,
                padding:'6px 14px',
                display:'flex',alignItems:'center',gap:6,
              }}>
                <span style={{color:s.color,fontSize:14,fontWeight:700}}>{s.emoji} {s.count}</span>
                <span style={{color:'rgba(255,255,255,0.75)',fontSize:12}}>{s.label}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Tip bar */}
      <div style={{maxWidth:660,margin:'14px auto 0',padding:'0 12px'}}>
        <div style={{
          background:'#fef9f4',border:'1px dashed #d4b090',
          borderRadius:10,padding:'10px 15px',
          fontSize:12,color:'#8a5e40',lineHeight:1.9,
        }}>
          <b>طريقة الاستخدام:</b> اضغطي ✓ للمؤكد · ✗ للاعتذار · ؟ غير مؤكد · اضغطي مجدداً لإلغاء التحديد
          <br/>
          للمجموعات: أدخلي عدد الحاضرات في الحقل · لتعديل أي اسم: اضغطي عليه · البيانات تُحفظ تلقائياً في المتصفح
        </div>
      </div>

      {/* List */}
      <div style={{maxWidth:660,margin:'12px auto 0',padding:'0 12px'}}>
        {data.map(section=>(

      <div style={{textAlign:'center',marginTop:30,fontSize:12,color:'#c0a090'}}>

  );
}
